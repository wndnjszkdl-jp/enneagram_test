<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>도르리 패밀리 에니어그램 테스트</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body class="theme-start">
  <div class="floating-bg"></div>

  <div class="app-wrap">
    <!-- 시작 화면 -->
    <section id="start-screen" class="screen active">
      <div class="card start-card">
        <div class="badge">도르리 패밀리 심리테스트</div>
        <h1>나와 가장 닮은 도르리는 <br> 누구일까요? 🌷</h1>
        <p class="subtitle">
          9가지 성향 중 지금의 나를 <br> 가장 잘 보여주는 캐릭터를 찾아보세요.<br />
          질문에 솔직하게 답하면 결과가 더 정확해져요.
        </p>

        <div class="family-image-wrap">
          <img
            src="{{ url_for('static', filename='images/dorori2.png') }}"
            alt="도르리 패밀리"
            class="family-image"
          />
        </div>


        <button id="start-btn" class="main-btn">테스트 시작하기</button>
      </div>
    </section>

    <!-- 질문 화면 -->
    <section id="question-screen" class="screen">
      <div class="card question-card">
        <div class="progress-top">
          <div class="progress-wrap">
            <div id="progress-bar"></div>
          </div>
          <div id="question-count" class="question-count"></div>
        </div>

        <div class="mood-box">
          <span id="mood-label">현재 분위기</span>
        </div>

        <h2 id="question-text" class="question-text"></h2>
        <p class="question-guide">가장 가까운 답을 하나 골라주세요.</p>

        <div id="answer-buttons" class="answer-buttons"></div>
      </div>
    </section>

    <!-- 결과 화면 -->
    <section id="result-screen" class="screen">
      <div class="card result-card">
        <div class="result-top-badge">테스트 결과</div>
        <h2 class="result-main-title">당신과 가장 닮은 도르리는</h2>

        <div class="result-family-wrap">
          <img
            src="{{ url_for('static', filename='images/dorori2.png') }}"
            alt="도르리 패밀리"
            class="result-family-image"
          />
        </div>

        <div class="result-identity-box">
          <img id="result-character" class="result-character" src="" alt="결과 캐릭터" />
          <div>
            <h3 id="result-name"></h3>
            <p id="result-keyword" class="result-keyword"></p>
          </div>
        </div>

        <div class="result-section">
          <h4>한 줄 요약</h4>
          <p id="result-summary"></p>
        </div>

        <div class="result-section">
          <h4>당신의 핵심 특성</h4>
          <p id="result-detail"></p>
        </div>

        <div class="result-grid">
          <div class="result-box">
            <h4>강점</h4>
            <p id="result-strength"></p>
          </div>
          <div class="result-box">
            <h4>주의할 점</h4>
            <p id="result-caution"></p>
          </div>
          <div class="result-box full">
            <h4>이럴 때 더 빛나요</h4>
            <p id="result-tip"></p>
          </div>
        </div>

        <div class="score-board">
          <h4>상위 성향</h4>
          <div id="top-scores" class="top-scores"></div>
        </div>

        <div class="save-form">
          <h4>결과 저장하기</h4>
          <input type="text" id="user-name" placeholder="이름을 입력해주세요" />
          <input type="text" id="user-phone" placeholder="연락처를 입력해주세요" />
          <button id="save-btn" class="main-btn">결과 저장하기</button>
          <p id="save-message" class="save-message"></p>
        </div>

        <button id="restart-btn" class="sub-btn">다시 테스트하기</button>
      </div>
    </section>
  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
