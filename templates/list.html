<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>테스트 결과 목록</title>
  <style>
    body {
      font-family: "Pretendard", "Malgun Gothic", sans-serif;
      background: #f8f8f8;
      margin: 0;
      padding: 24px;
      color: #333;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 28px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
    }

    thead {
      background: #f1f5f9;
    }

    th, td {
      padding: 14px 12px;
      text-align: left;
      border-bottom: 1px solid #e5e7eb;
      font-size: 15px;
    }

    th {
      font-weight: 700;
      color: #444;
    }

    tr:hover {
      background: #fafafa;
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: #eef6ff;
      color: #2563eb;
      font-size: 13px;
      font-weight: 600;
    }

    .empty {
      padding: 30px 10px;
      text-align: center;
      color: #888;
    }

    @media (max-width: 768px) {
      body {
        padding: 14px;
      }

      h1 {
        font-size: 22px;
      }

      .card {
        padding: 14px;
      }

      th, td {
        font-size: 14px;
        padding: 12px 10px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>도르리 테스트 결과 목록 📋</h1>

    <div class="card">
      {% if rows %}
      <table>
        <thead>
          <tr>
            <th>번호</th>
            <th>이름</th>
            <th>연락처</th>
            <th>유형</th>
            <th>캐릭터</th>
            <th>성향</th>
            <th>저장시간</th>
          </tr>
        </thead>
        <tbody>
          {% for row in rows %}
          <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>{{ row[2] }}</td>
            <td><span class="badge">{{ row[3] }}번</span></td>
            <td>{{ row[4] }}</td>
            <td>{{ row[5] }}</td>
            <td>{{ row[6] }}</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
      {% else %}
      <div class="empty">아직 저장된 결과가 없습니다.</div>
      {% endif %}
    </div>
  </div>
</body>
</html>
